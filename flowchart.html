<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio Flowchart</title>
<style>
body {
    font-family: Arial;
    text-align: center;
}
.box {
    border: 2px solid black;
    padding: 10px;
    margin: 10px auto;
    width: 250px;
}
.arrow {
    font-size: 20px;
}
</style>
</head>
<body>

<h2>Crypto Portfolio Flowchart</h2>

<div class="box">Start</div>
<div class="arrow">↓</div>

<div class="box">Input BTC, ETH, NFT</div>
<div class="arrow">↓</div>

<div class="box">Create Assets</div>
<div class="arrow">↓</div>

<div class="box">Add Assets to Portfolio</div>
<div class="arrow">↓</div>

<div class="box">Load prices from JSON</div>
<div class="arrow">↓</div>

<div class="box">Read prices.json</div>
<div class="arrow">↓</div>

<div class="box">Update Asset Prices</div>
<div class="arrow">↓</div>

<div class="box">Calculate Total Value</div>
<div class="arrow">↓</div>

<div class="box">Display Result</div>
<div class="arrow">↓</div>

<div class="box">End</div>

</body>
</html>
